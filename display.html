<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Menara Optometry MDV — Live Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --navy: #1B1464;
    --navy-deep: #0D0B6F;
    --scarlet: #E60012;
    --gold: #D4A843;
    --gold-glow: #F2C94C;
    --cyan: #3EADD6;
    --cream: #FAFBFE;
    --soft: #F4F6FB;
    --line: rgba(255,255,255,0.12);
    --ink: #0F1629;
    --muted: #A8B0C4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--navy);
    color: #fff;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  /* Hide cursor only in fullscreen / kiosk mode (?kiosk=1) */
  body.kiosk-mode { cursor: none; }
  body.kiosk-mode * { cursor: none !important; }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }

  /* Ambient gradient behind everything */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at top, rgba(212,168,67,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom, rgba(230,0,18,0.06) 0%, transparent 50%),
      linear-gradient(180deg, #0D0B6F 0%, #1B1464 50%, #0D0B6F 100%);
    z-index: -1;
    animation: ambientShift 30s ease-in-out infinite;
  }
  @keyframes ambientShift {
    0%, 100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(8deg); }
  }

  /* ────── HEADER ────── */
  .header {
    flex-shrink: 0;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(13,11,111,0.95) 0%, rgba(27,20,100,0.65) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--line);
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-logo {
    height: 32px;
    width: auto;
    display: block;
    background: #fff;
    padding: 4px 8px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .brand-sub {
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 3px;
  }
  .anniversary {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: linear-gradient(135deg, rgba(212,168,67,0.18), rgba(242,201,76,0.08));
    border: 1px solid rgba(212,168,67,0.35);
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    color: var(--gold-glow);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .anniversary::before {
    content: '✦';
    font-size: 11px;
    animation: sparkle 2.5s ease-in-out infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 1; transform: rotate(0deg) scale(1); }
    50% { opacity: 0.5; transform: rotate(180deg) scale(0.9); }
  }
  .clock {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-align: right;
    line-height: 1.3;
  }
  .clock-time {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  /* ────── TODAY BADGE ────── */
  .today-band {
    flex-shrink: 0;
    padding: 16px 22px 8px;
    text-align: center;
  }
  .today-day {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1;
  }
  .today-day .day-accent {
    color: var(--gold);
    font-style: italic;
  }
  .today-date {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .today-promo-strip {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: rgba(230,0,18,0.15);
    border: 1px solid rgba(230,0,18,0.4);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    color: #FFB3B8;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .today-promo-strip::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--scarlet);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(230,0,18,0.7); }
    50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(230,0,18,0); }
  }

  /* ────── HERO STAGE ────── */
  .stage {
    flex: 1;
    position: relative;
    padding: 10px 22px 14px;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .promo-card {
    position: relative;
    flex: 1;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.45),
      0 4px 14px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.08);
    background: #000;
    min-height: 0;
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1), transform 8.5s linear;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Slides show poster image as-is, no text overlay.
     Only small floating badges for special states (today, expiring). */
  .slide-badge {
    position: absolute;
    top: 14px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .slide-badge.today {
    left: 14px;
    background: rgba(230,0,18,0.95);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
  }
  .slide-badge.today::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: pulseDot 1.5s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .slide-badge.expiring {
    right: 14px;
    background: rgba(255,193,7,0.95);
    border: 1px solid rgba(255,255,255,0.4);
    color: #1B1464;
  }
  .slide-badge.expiring.last-day {
    background: rgba(230,0,18,0.95);
    color: #fff;
    animation: lastDayPulse 1.4s ease-in-out infinite;
  }
  @keyframes lastDayPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 16px rgba(230,0,18,0.5); }
    50% { transform: scale(1.05); box-shadow: 0 4px 22px rgba(230,0,18,0.8); }
  }
  .slide-badge.gold {
    left: 14px;
    background: linear-gradient(135deg, rgba(212,168,67,0.96), rgba(242,201,76,0.92));
    border: 1px solid rgba(255,255,255,0.4);
    color: #1B1464;
  }

  /* ────── COMING-UP / DOTS ────── */
  .progress {
    flex-shrink: 0;
    padding: 12px 22px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .progress-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.55);
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .dots {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    transition: all 0.35s ease;
  }
  .dot.active {
    background: var(--gold);
    width: 22px;
    border-radius: 999px;
    box-shadow: 0 0 10px rgba(212,168,67,0.5);
  }

  /* ────── FOOTER ────── */
  .footer {
    flex-shrink: 0;
    padding: 14px 22px 18px;
    background: linear-gradient(180deg, transparent 0%, rgba(13,11,111,0.75) 50%, rgba(13,11,111,0.95) 100%);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .contact {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .wa-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .wa-line .wa-icon {
    width: 16px;
    height: 16px;
    background: #25D366;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 10px;
    font-weight: 900;
  }
  .location {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.6px;
    font-weight: 500;
  }
  .qr-stub {
    text-align: center;
    font-size: 8px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1.3;
  }
  .qr-stub strong {
    display: block;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin-top: 2px;
    text-transform: none;
    font-weight: 700;
  }

  /* ────── SUDOKU TEMPLATE SLIDE (full-bleed, large type) ────── */
  .sudoku-slide {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 0%, rgba(212,168,67,0.22) 0%, transparent 55%),
      radial-gradient(circle at 100% 100%, rgba(230,0,18,0.12) 0%, transparent 55%),
      linear-gradient(160deg, #faf6ec 0%, #ffffff 60%, #f4f6fb 100%);
    color: #1B1464;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 44px 28px 36px;
    text-align: center;
    gap: 18px;
  }
  .sudoku-eyebrow {
    font-size: 16px;
    letter-spacing: 6px;
    font-weight: 800;
    color: #E60012;
    text-transform: uppercase;
  }
  .sudoku-title {
    font-family: 'Playfair Display', serif;
    font-size: 96px;
    font-weight: 700;
    color: #1B1464;
    letter-spacing: -3px;
    margin: 8px 0 10px;
    line-height: 1;
  }
  .sudoku-tagline {
    font-size: 19px;
    color: #5A6478;
    font-weight: 500;
    max-width: 360px;
    line-height: 1.4;
  }
  .sudoku-qr-frame {
    background: #fff;
    padding: 22px;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(27,20,100,0.15), 0 4px 10px rgba(27,20,100,0.06);
    border: 3px solid #D4A843;
    text-align: center;
    position: relative;
  }
  .sudoku-qr-frame::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 30px;
    background: linear-gradient(135deg, rgba(212,168,67,0.45), transparent);
    z-index: -1;
    filter: blur(12px);
  }
  .sudoku-qr-target {
    width: 320px; height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  .sudoku-qr-target img, .sudoku-qr-target canvas {
    width: 100% !important;
    height: 100% !important;
    display: block;
  }
  .sudoku-qr-caption {
    margin-top: 14px;
    font-size: 14px;
    color: #5A6478;
    line-height: 1.4;
    font-weight: 500;
  }
  .sudoku-qr-caption strong {
    display: block;
    font-size: 20px;
    color: #1B1464;
    font-weight: 800;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .sudoku-vouchers-label {
    font-size: 15px;
    letter-spacing: 4px;
    font-weight: 800;
    color: #1B1464;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .sudoku-tiers-wrap { width: 100%; }
  .sudoku-tiers {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    width: 100%;
  }
  .tier {
    background: #fff;
    border-radius: 16px;
    padding: 18px 6px 14px;
    box-shadow: 0 4px 14px rgba(27,20,100,0.08);
    border-top: 5px solid;
  }
  .tier-bronze { border-color: #cd7f32; }
  .tier-silver { border-color: #B8B8B8; }
  .tier-gold {
    border-color: #D4A843;
    background: linear-gradient(180deg, rgba(212,168,67,0.14), #fff);
    transform: scale(1.08);
    box-shadow: 0 10px 26px rgba(212,168,67,0.32);
  }
  .tier-label {
    font-size: 12px;
    letter-spacing: 2.5px;
    font-weight: 800;
  }
  .tier-bronze .tier-label { color: #cd7f32; }
  .tier-silver .tier-label { color: #777; }
  .tier-gold .tier-label { color: #b8860b; }
  .tier-amount {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 800;
    color: #1B1464;
    margin: 4px 0 0;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  .tier-detail {
    font-size: 11px;
    color: #5A6478;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .tier-puzzles {
    font-size: 13px;
    color: #1B1464;
    font-weight: 700;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(27,20,100,0.10);
  }
  .sudoku-footnote {
    font-size: 13px;
    color: #5A6478;
    letter-spacing: 0.3px;
    font-style: italic;
    max-width: 360px;
    line-height: 1.4;
  }

  /* ────── CAT CORNER (inline SVG, CSS-animated) ────── */
  .cat-corner {
    position: absolute;
    bottom: 8px;
    left: 8px;
    width: 150px;
    height: 150px;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45));
  }
  .cat-svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  .cat-state-label {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(13,11,111,0.9);
    backdrop-filter: blur(8px);
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .cat-corner.show-label .cat-state-label { opacity: 1; }

  /* State extras hidden by default */
  .cat-zzz, .cat-bowl, .cat-food, .cat-ball { opacity: 0; transition: opacity .4s; }
  .cat-eyes-closed { opacity: 0; transition: opacity .3s; }

  /* The whole cat sits in .cat-rig — animate this group for hops/breathing */
  .cat-rig { transform-origin: 75px 120px; }

  /* === WALKING === */
  .cat-walking .cat-rig { animation: walkBob 0.6s ease-in-out infinite alternate; }
  .cat-walking .cat-tail-grp { animation: tailWag 0.7s ease-in-out infinite; transform-origin: 88px 78px; transform-box: fill-box; }
  .cat-walking .cat-leg-bl { animation: legStepBL 0.6s ease-in-out infinite; transform-origin: 42px 110px; transform-box: fill-box; }
  .cat-walking .cat-leg-br { animation: legStepBR 0.6s ease-in-out infinite; transform-origin: 82px 110px; transform-box: fill-box; }
  @keyframes walkBob { 0% { transform: translateY(0) } 100% { transform: translateY(-3px) } }
  @keyframes tailWag { 0%, 100% { transform: rotate(-10deg) } 50% { transform: rotate(18deg) } }
  @keyframes legStepBL { 0%, 100% { transform: scaleY(1) } 50% { transform: scaleY(0.8) } }
  @keyframes legStepBR { 0%, 100% { transform: scaleY(0.8) } 50% { transform: scaleY(1) } }

  /* === SLEEPING === whole cat breathes, eyes close, ZZZ floats */
  .cat-sleeping .cat-eyes-open { opacity: 0; }
  .cat-sleeping .cat-eyes-closed { opacity: 1; }
  .cat-sleeping .cat-rig { animation: breathe 3.5s ease-in-out infinite; transform-origin: 75px 120px; }
  .cat-sleeping .cat-tail-grp { animation: tailCurl 3.5s ease-in-out infinite; transform-origin: 88px 78px; transform-box: fill-box; }
  .cat-sleeping .cat-zzz { opacity: 1; animation: zzzFloat 2.8s ease-in-out infinite; }
  @keyframes breathe { 0%, 100% { transform: scale(1) translateY(0) } 50% { transform: scale(1.04) translateY(-1px) } }
  @keyframes tailCurl { 0%, 100% { transform: rotate(8deg) } 50% { transform: rotate(2deg) } }
  @keyframes zzzFloat {
    0% { opacity: 0; transform: translateY(0) }
    20% { opacity: 1 }
    100% { opacity: 0; transform: translateY(-18px) }
  }

  /* === PLAYING === whole cat hops, tail flicks, ball appears */
  .cat-playing .cat-rig { animation: catHop 0.7s ease-in-out infinite; }
  .cat-playing .cat-tail-grp { animation: tailWag 0.3s ease-in-out infinite; transform-origin: 88px 78px; transform-box: fill-box; }
  .cat-playing .cat-ball { opacity: 1; animation: ballRoll 0.7s ease-in-out infinite; transform-origin: 110px 115px; transform-box: fill-box; }
  @keyframes catHop { 0%, 100% { transform: translateY(0) scaleY(1) } 50% { transform: translateY(-10px) scaleY(1.02) } }
  @keyframes ballRoll { 0%, 100% { transform: translateX(0) rotate(0deg) } 50% { transform: translateX(-12px) rotate(-200deg) } }

  /* === EATING === whole cat tilts slightly toward bowl (head + body stay attached) */
  .cat-eating .cat-rig { animation: eatLean 0.9s ease-in-out infinite; transform-origin: 75px 115px; }
  .cat-eating .cat-bowl { opacity: 1; }
  .cat-eating .cat-food { opacity: 1; animation: foodNibble 0.9s ease-in-out infinite; }
  .cat-eating .cat-tail-grp { animation: tailTwitch 1.4s ease-in-out infinite; transform-origin: 88px 78px; transform-box: fill-box; }
  @keyframes eatLean { 0%, 100% { transform: rotate(0) translateY(0) } 50% { transform: rotate(-6deg) translateY(2px) } }
  @keyframes foodNibble { 0%, 100% { opacity: 1; transform: scale(1) } 50% { opacity: 0.4; transform: scale(0.7) } }
  @keyframes tailTwitch { 0%, 100% { transform: rotate(-5deg) } 50% { transform: rotate(8deg) } }

  /* ────── STATUS / LOADING ────── */
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-dot {
    position: fixed;
    bottom: 6px;
    right: 8px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(80,200,120,0.7);
    z-index: 99;
  }
  .status-dot.offline { background: rgba(230,0,18,0.7); }

  /* Mid-Valley orientation guard:
     Optimized for 768x1366 portrait (Philips DISPLAY2).
     Scales gracefully on other ratios. */
  @media (min-aspect-ratio: 4/5) {
    /* Landscape fallback — content reflow */
    body { padding: 0; }
  }

  /* High-DPI tuning */
  @media (min-width: 900px) and (orientation: portrait) {
    .today-day { font-size: 40px; }
    .slide-title { font-size: 24px; }
    .slide-subtitle { font-size: 14px; }
    .brand-mark { font-size: 26px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- Header -->
<header class="header">
  <div class="brand">
    <img class="brand-logo" src="assets/brand/menara-logo.jpg" alt="Menara Optometry" />
  </div>
  <div class="anniversary">30 Tahun</div>
  <div class="clock">
    <div class="clock-time" id="clockTime">--:--</div>
    <div id="clockDate">—</div>
  </div>

<!-- Stage -->
<div class="stage">
  <div class="promo-card" id="promoCard">
    <!-- Slides injected by JS -->
  </div>
  <!-- Inline SVG tuxedo cat (chibi style) — head & body always attached -->
  <div class="cat-corner cat-walking" id="catCorner">
    <svg class="cat-svg" viewBox="0 0 150 130" xmlns="http://www.w3.org/2000/svg">

        <radialGradient id="catEyeShine" cx="0.3" cy="0.3" r="0.7">

        </radialGradient>

      <!-- Static shadow under cat -->

      <!-- Bowl (under eating state) -->

        <ellipse cx="36.5" cy="108" rx="11.5" ry="2.5" fill="#a07b2c"/>
      </g>
      <g class="cat-food">
        <circle cx="32" cy="107" r="1.5" fill="#3a2a1a"/>
        <circle cx="36" cy="106" r="1.5" fill="#3a2a1a"/>
        <circle cx="40" cy="107" r="1.5" fill="#3a2a1a"/>
      </g>

      <!-- Ball (under playing state) -->
      <g class="cat-ball">
        <circle cx="110" cy="115" r="7" fill="#E60012"/>
        <path d="M105,113 Q110,109 115,113" stroke="#fff" stroke-width="1.1" fill="none" opacity="0.7"/>
        <path d="M106,118 Q110,121 114,118" stroke="#fff" stroke-width="1.1" fill="none" opacity="0.5"/>
      </g>

      <!-- ZZZ floats up (sleeping state) -->
      <g class="cat-zzz">
        <text x="105" y="40" fill="#fff" font-family="Plus Jakarta Sans,sans-serif" font-size="20" font-weight="800">Z</text>
        <text x="120" y="26" fill="#fff" font-family="Plus Jakarta Sans,sans-serif" font-size="15" font-weight="800" opacity="0.75">z</text>
        <text x="132" y="16" fill="#fff" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="800" opacity="0.5">z</text>
      </g>

      <!-- ============ THE CAT (rig) ============ -->
      <!-- Everything inside .cat-rig moves together. Sub-parts (tail, legs) animate within their own coords. -->
      <g class="cat-rig">

        <!-- Tail (animates around its anchor at body) -->
        <g class="cat-tail-grp">
          <path d="M86 86 Q116 70 112 35 Q110 28 118 28"
                stroke="#1a1a1a" stroke-width="11" fill="none" stroke-linecap="round"/>
          <!-- White tail tip -->
          <circle cx="118" cy="28" r="6" fill="#fff" stroke="#1a1a1a" stroke-width="1"/>
        </g>

        <!-- Body (chunky chibi proportions) -->
        <ellipse cx="62" cy="90" rx="32" ry="22" fill="#1a1a1a"/>
        <!-- White chest/belly -->
        <ellipse cx="62" cy="95" rx="22" ry="14" fill="#fff"/>

        <!-- Back legs -->
        <ellipse class="cat-leg-bl" cx="42" cy="110" rx="7" ry="9" fill="#1a1a1a"/>
        <ellipse class="cat-leg-br" cx="82" cy="110" rx="7" ry="9" fill="#1a1a1a"/>
        <!-- White paws -->
        <ellipse cx="42" cy="116" rx="7" ry="3" fill="#fff"/>
        <ellipse cx="82" cy="116" rx="7" ry="3" fill="#fff"/>

        <!-- ===== HEAD (sits ON TOP of body, big and round for cuteness) ===== -->
        <!-- Outer ears -->
        <polygon points="32,52 39,32 50,50" fill="#1a1a1a"/>
        <polygon points="74,50 85,32 92,52" fill="#1a1a1a"/>
        <!-- Inner ears (pink) -->
        <polygon points="37,50 40,40 46,49" fill="#ff9eb5"/>
        <polygon points="78,49 84,40 88,50" fill="#ff9eb5"/>

        <!-- Head (BIG round black) -->
        <circle cx="62" cy="58" r="26" fill="#1a1a1a"/>

        <!-- White face mask (chunky teardrop) -->
        <path d="M44,62 Q49,82 62,82 Q75,82 80,62 Q76,79 62,80 Q48,79 44,62 Z" fill="#fff"/>

        <!-- ===== EYES (BIG for max cute) ===== -->
        <g class="cat-eyes-open">
          <!-- Eye whites -->
          <ellipse cx="52" cy="58" rx="5" ry="6.5" fill="#fff"/>
          <ellipse cx="72" cy="58" rx="5" ry="6.5" fill="#fff"/>
          <!-- Iris (green gradient) -->
          <ellipse cx="52" cy="58" rx="4" ry="5.5" fill="url(#catEyeShine)"/>
          <ellipse cx="72" cy="58" rx="4" ry="5.5" fill="url(#catEyeShine)"/>
          <!-- Pupil (thin vertical slit) -->
          <ellipse cx="52" cy="59" rx="1.2" ry="4" fill="#1a1a1a"/>
          <ellipse cx="72" cy="59" rx="1.2" ry="4" fill="#1a1a1a"/>
          <!-- Sparkle highlights -->
          <circle cx="53.5" cy="55.5" r="1.4" fill="#fff"/>

          <circle cx="50.5" cy="60.5" r="0.6" fill="#fff" opacity="0.8"/>

        <!-- Closed eyes (sleeping) -->
        <g class="cat-eyes-closed">
          <path d="M47,59 Q52,55 57,59" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M67,59 Q72,55 77,59" stroke="#1a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
        </g>

        <!-- Pink blush cheeks -->
        <ellipse cx="45" cy="68" rx="4" ry="2.5" fill="#ff9eb5" opacity="0.55"/>
        <ellipse cx="79" cy="68" rx="4" ry="2.5" fill="#ff9eb5" opacity="0.55"/>

        <!-- Heart-shape nose -->
        <path d="M59,68 Q62,73 65,68 Q62,71 59,68 Z" fill="#ff7090"/>

        <!-- Mouth (cute w-shape) -->
        <path d="M62,71 Q59,75 56,73 M62,71 Q65,75 68,73" stroke="#1a1a1a" stroke-width="1.4" fill="none" stroke-linecap="round"/>

        <!-- Whiskers -->
        <line x1="44" y1="68" x2="30" y2="66" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/>
        <line x1="44" y1="71" x2="30" y2="73" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/>
        <line x1="80" y1="68" x2="94" y2="66" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/>
        <line x1="80" y1="71" x2="94" y2="73" stroke="#fff" stroke-width="0.9" stroke-linecap="round"/>

    </svg>
    <div class="cat-state-label" id="catStateLabel">walking</div>

</div>

<!-- Progress -->
<div class="progress">
  <div class="progress-label">Coming Up</div>
  <div class="dots" id="dots"></div>
  <div class="progress-label" id="slideCounter">0 / 0</div>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="contact">
    <div class="wa-line">
      <span class="wa-icon">W</span>
      +60 11-5419 7980
    </div>
    <div class="location">LG-017 · Mid Valley Megamall · Kuala Lumpur</div>
  </div>
  <div class="qr-stub">
    Scan / WhatsApp
    <strong>Walk-in welcome</strong>
  </div>
</footer>

<!-- Status indicator -->
<div class="status-dot" id="statusDot" title="Connection status"></div>

<script>
(function() {
  'use strict';

  const SLIDE_DURATION = 8500;        // ms per slide
  const REFRESH_INTERVAL = 60 * 60e3; // reload page every 1 hr
  const DATA_URL = 'promos.json';

  const DAY_NAMES_MY = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];
  const DAY_NAMES_EN = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const MONTHS_MY = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];

  let slides = [];
  let currentIndex = 0;
  let timer = null;

  // ─── Date helpers ───
  // Use LOCAL date components (not UTC). For MYT (UTC+8) this means
  // cutoffs happen at midnight Malaysia time, not 8am MYT.
  function todayISO() {
    const d = new Date();
    return d.getFullYear() + '-' +
           String(d.getMonth() + 1).padStart(2, '0') + '-' +
           String(d.getDate()).padStart(2, '0');
  }
  function isPromoActive(promo, todayStr) {
    if (promo.validFrom && todayStr < promo.validFrom) return false;
    if (promo.validUntil && todayStr > promo.validUntil) return false;
    return true;
  }
  function daysUntil(dateStr) {
    if (!dateStr) return Infinity;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr);
    return Math.ceil((target - today) / 86400000);
  }

  // ─── Clock ───
  function updateClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    document.getElementById('clockTime').textContent = `${hh}:${mm}`;
    document.getElementById('clockDate').textContent = `${d.getDate()} ${MONTHS_MY[d.getMonth()]}`;
  }

  // ─── Today band ───
  function paintTodayBand(today7DP) {
    const d = new Date();
    const dayEN = DAY_NAMES_EN[d.getDay()];
    const dayMY = DAY_NAMES_MY[d.getDay()];
    document.getElementById('todayDay').innerHTML =
      `${dayEN} <span class="day-accent">/ ${dayMY}</span>`;
    document.getElementById('todayDate').textContent =
      `${d.getDate()} ${MONTHS_MY[d.getMonth()]} ${d.getFullYear()}`;
    if (today7DP) {
      document.getElementById('todayPromoStrip').textContent = today7DP.dayName;
    } else {
      document.getElementById('todayPromoStrip').textContent = 'Today\'s Special';
    }
  }

  // ─── Slide templates ───
  function renderSudokuTemplate() {
    return `
      <div class="sudoku-slide">
        <div>
          <div class="sudoku-eyebrow">Brain Break</div>
          <h1 class="sudoku-title">Sudoku</h1>
          <div class="sudoku-tagline">Bored while waiting? Scan, solve, and win.</div>
        </div>
        <div class="sudoku-qr-frame">
          <div class="sudoku-qr-target" data-qr></div>
          <div class="sudoku-qr-caption">
            <strong>SCAN TO PLAY</strong>
            Free · No app · Play in browser
          </div>
        </div>
        <div class="sudoku-tiers-wrap">
          <div class="sudoku-vouchers-label">Win vouchers up to RM100</div>
          <div class="sudoku-tiers">
            <div class="tier tier-bronze">
              <div class="tier-label">BRONZE</div>
              <div class="tier-amount">RM30</div>
              <div class="tier-detail">Voucher</div>
              <div class="tier-puzzles">Solve 15</div>
            </div>
            <div class="tier tier-silver">
              <div class="tier-label">SILVER</div>
              <div class="tier-amount">RM50</div>
              <div class="tier-detail">Voucher</div>
              <div class="tier-puzzles">Solve 30</div>
            </div>
            <div class="tier tier-gold">
              <div class="tier-label">GOLD</div>
              <div class="tier-amount">RM100</div>
              <div class="tier-detail">Voucher</div>
              <div class="tier-puzzles">Solve 50</div>
            </div>
          </div>
        </div>
        <div class="sudoku-footnote">Show your score at the counter to claim your voucher.</div>
      </div>
    `;
  }

  function injectQRCode(slideEl, url) {
    const target = slideEl.querySelector('[data-qr]');
    if (!target || typeof QRCode === 'undefined') return;
    target.innerHTML = '';
    new QRCode(target, {
      text: url,
      width: 320,
      height: 320,
      colorDark: '#1B1464',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  // ─── Slide builder ───
  function buildSlideElement(s, index) {
    const div = document.createElement('div');
    div.className = 'slide';
    div.dataset.index = index;

    if (s.template === 'sudoku') {
      div.innerHTML = renderSudokuTemplate();
      // Generate QR after element exists in DOM
      const qrUrl = s.qrUrl || 'https://menaraoptometrymidvalley.github.io/menaraoptometrycentre-midvalley/sudoku/';
      requestAnimationFrame(() => injectQRCode(div, qrUrl));
    } else {
      const img = document.createElement('img');
      img.src = s.image;
      img.alt = s.alt || '';
      img.onerror = () => {
        img.style.display = 'none';
        div.style.background = 'linear-gradient(135deg, #0D0B6F, #1B1464)';
      };
      div.appendChild(img);
    }

    // Top-left badge (today / anniversary)
    if (s.todayBadge) {
      const b = document.createElement('div');
      b.className = 'slide-badge today';
      b.textContent = s.todayBadge;
      div.appendChild(b);
    } else if (s.goldBadge) {
      const b = document.createElement('div');
      b.className = 'slide-badge gold';
      b.textContent = s.goldBadge;
      div.appendChild(b);
    }

    // Top-right badge (expiry urgency)
    if (s.expiryDays !== undefined && s.expiryDays >= 0 && s.expiryDays <= 14) {
      const ef = document.createElement('div');
      ef.className = 'slide-badge expiring' + (s.expiryDays === 0 ? ' last-day' : '');
      ef.textContent = s.expiryDays === 0
        ? '⏰ Last Day!'
        : `⏰ ${s.expiryDays}d left`;
      div.appendChild(ef);
    }

    return div;
  }

  function renderDots() {
    const dotsEl = document.getElementById('dots');
    dotsEl.innerHTML = '';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === currentIndex ? ' active' : '');
      dotsEl.appendChild(d);
    });
    document.getElementById('slideCounter').textContent =
      `${currentIndex + 1} / ${slides.length}`;
  }

  function showSlide(idx) {
    const cards = document.querySelectorAll('.slide');
    cards.forEach((c, i) => c.classList.toggle('active', i === idx));
    currentIndex = idx;
    renderDots();
  }

  function advance() {
    if (slides.length === 0) return;
    showSlide((currentIndex + 1) % slides.length);
  }

  // ─── Build slide deck — CURATED for today only ───
  function buildDeck(data) {
    const today = todayISO();
    const dayOfWeek = new Date().getDay();
    const deck = [];

    // 1. TODAY's 7DP — the headliner
    const today7DP = (data.weekly7DP || []).find(p => p.day === dayOfWeek);
    if (today7DP) {
      deck.push({
        image: today7DP.image,
        alt: today7DP.dayName,
        todayBadge: 'Today · ' + today7DP.dayName
      });
    }

    // 2. Day-specific bonus content (e.g., Thursday adds CL Aftercare)
    //    Items with validFrom/validUntil are filtered; undated items pass through.
    const dayBonus = (data.dayBonus && data.dayBonus[String(dayOfWeek)]) || [];
    dayBonus
      .filter(p => isPromoActive(p, today))
      .forEach(p => {
        deck.push({
          image: p.image,
          alt: p.title,
          todayBadge: p.category || 'Today'
        });
      });

    // 3. Beli & Menang campaign sequence (plays all 4 slides in order)
    const campaigns = (data.campaigns || [])
      .filter(c => isPromoActive(c, today))
      .sort((a, b) => (b.priority || 0) - (a.priority || 0));

    campaigns.forEach(c => {
      if (c.playAsSequence && Array.isArray(c.sequence)) {
        c.sequence.forEach((s, idx) => {
          deck.push({
            image: s.image,
            alt: c.title + ' — ' + (s.label || ''),
            goldBadge: s.label || c.title
          });
        });
      } else {
        deck.push({
          image: c.image,
          alt: c.title,
          goldBadge: c.category || c.title
        });
      }
    });

    // 4. Expiring active promos (≤14 days) — urgency first
    const active = (data.activePromos || [])
      .filter(p => isPromoActive(p, today))
      .map(p => ({ ...p, _daysLeft: daysUntil(p.validUntil) }));

    const expiring = active
      .filter(p => p._daysLeft >= 0 && p._daysLeft <= 14)
      .sort((a, b) => a._daysLeft - b._daysLeft);

    expiring.forEach(p => {
      deck.push({
        image: p.image,
        alt: p.title,
        expiryDays: p._daysLeft
      });
    });

    // 5. Top 2 active promos (not expiring) by priority
    const longRunning = active
      .filter(p => p._daysLeft > 14)
      .sort((a, b) => (b.priority || 0) - (a.priority || 0))
      .slice(0, 2);

    longRunning.forEach(p => {
      deck.push({
        image: p.image,
        alt: p.title
      });
    });

    // 6. Sudoku brain-break (rendered as HTML template, includes live QR + voucher tiers)
    const sudoku = (data.evergreen || []).find(e => e.id === 'sudoku-brain-break');
    if (sudoku) {
      deck.push({
        template: 'sudoku',
        qrUrl: sudoku.qrUrl,
        alt: sudoku.title
      });
    }

    // 7. 30 Tahun anniversary closer
    const anniversary = (data.evergreen || []).find(e => e.id === '30-tahun');
    if (anniversary) {
      deck.push({
        image: anniversary.image,
        alt: anniversary.title,
        goldBadge: '30 Tahun'
      });
    }

    return deck;
  }

  // ─── Boot ───
  async function boot() {
    updateClock();
    setInterval(updateClock, 30000);

    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const today7DP = (data.weekly7DP || []).find(p => p.day === new Date().getDay());
      paintTodayBand(today7DP);

      slides = buildDeck(data);

      const card = document.getElementById('promoCard');
      card.innerHTML = '';
      slides.forEach((s, i) => card.appendChild(buildSlideElement(s, i)));

      if (slides.length > 0) {
        showSlide(0);
        timer = setInterval(advance, SLIDE_DURATION);
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('statusDot').classList.remove('offline');
    } catch (err) {
      console.error('Failed to load promos.json:', err);
      document.getElementById('statusDot').classList.add('offline');
      document.getElementById('loading').innerHTML =
        '<div style="color:#fff;text-align:center;font-family:Plus Jakarta Sans,sans-serif">' +
        '<div style="font-size:48px;margin-bottom:12px">⚠</div>' +
        '<div style="font-size:14px;opacity:0.7">Loading promotions failed</div>' +
        '<div style="font-size:11px;opacity:0.5;margin-top:6px">Retrying in 30 seconds</div></div>';
      setTimeout(() => location.reload(), 30000);
    }
  }

  // ─── Inline SVG cat — cycles through 4 states ───
  const CAT_STATES = ['walking', 'sleeping', 'playing', 'eating'];
  const CAT_STATE_INTERVAL = 14000;  // 14 sec per state
  let catIdx = 0;

  function setCatState(state) {
    const cat = document.getElementById('catCorner');
    CAT_STATES.forEach(s => cat.classList.remove('cat-' + s));
    cat.classList.add('cat-' + state);
    document.getElementById('catStateLabel').textContent = state;
    cat.classList.add('show-label');
    setTimeout(() => cat.classList.remove('show-label'), 2500);
  }

  function rotateCatState() {
    catIdx = (catIdx + 1) % CAT_STATES.length;
    setCatState(CAT_STATES[catIdx]);
  }

  function startCat() {
    setCatState(CAT_STATES[0]);
    setInterval(rotateCatState, CAT_STATE_INTERVAL);
  }

  // Hard refresh every hour to pick up new promos.json
  setTimeout(() => location.reload(), REFRESH_INTERVAL);

  // Cursor hiding — only in kiosk/fullscreen mode
  function syncKioskMode() {
    const isKiosk = !!document.fullscreenElement
      || new URLSearchParams(location.search).has('kiosk');
    document.body.classList.toggle('kiosk-mode', isKiosk);
  }
  document.addEventListener('fullscreenchange', syncKioskMode);
  syncKioskMode();

  // Connection monitoring
  window.addEventListener('online', () => {
    document.getElementById('statusDot').classList.remove('offline');
  });
  window.addEventListener('offline', () => {
    document.getElementById('statusDot').classList.add('offline');
  });

  // Click anywhere to advance manually (useful during setup)
  document.addEventListener('click', () => {
    clearInterval(timer);
    advance();
    timer = setInterval(advance, SLIDE_DURATION);
  });

  // Press F for fullscreen
  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'f') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  });

  boot();
  startCat();
})();
</script>
