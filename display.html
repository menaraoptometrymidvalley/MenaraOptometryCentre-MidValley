<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Menara Optometry MDV — Live Display</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --navy: #1B1464;
    --navy-deep: #0D0B6F;
    --scarlet: #E60012;
    --gold: #D4A843;
    --gold-glow: #F2C94C;
    --cyan: #3EADD6;
    --cream: #FAFBFE;
    --soft: #F4F6FB;
    --line: rgba(255,255,255,0.12);
    --ink: #0F1629;
    --muted: #A8B0C4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--navy);
    color: #fff;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  /* Hide cursor only in fullscreen / kiosk mode (?kiosk=1) */
  body.kiosk-mode { cursor: none; }
  body.kiosk-mode * { cursor: none !important; }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: relative;
  }

  /* Ambient gradient behind everything */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at top, rgba(212,168,67,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at bottom, rgba(230,0,18,0.06) 0%, transparent 50%),
      linear-gradient(180deg, #0D0B6F 0%, #1B1464 50%, #0D0B6F 100%);
    z-index: -1;
    animation: ambientShift 30s ease-in-out infinite;
  }
  @keyframes ambientShift {
    0%, 100% { filter: hue-rotate(0deg); }
    50% { filter: hue-rotate(8deg); }
  }

  /* ────── HEADER ────── */
  .header {
    flex-shrink: 0;
    padding: 14px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, rgba(13,11,111,0.95) 0%, rgba(27,20,100,0.65) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--line);
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-logo {
    height: 32px;
    width: auto;
    display: block;
    background: #fff;
    padding: 4px 8px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }
  .brand-sub {
    font-size: 8px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 3px;
  }
  .anniversary {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: linear-gradient(135deg, rgba(212,168,67,0.18), rgba(242,201,76,0.08));
    border: 1px solid rgba(212,168,67,0.35);
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    color: var(--gold-glow);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .anniversary::before {
    content: '✦';
    font-size: 11px;
    animation: sparkle 2.5s ease-in-out infinite;
  }
  @keyframes sparkle {
    0%, 100% { opacity: 1; transform: rotate(0deg) scale(1); }
    50% { opacity: 0.5; transform: rotate(180deg) scale(0.9); }
  }
  .clock {
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-align: right;
    line-height: 1.3;
  }
  .clock-time {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  /* ────── TODAY BADGE ────── */
  .today-band {
    flex-shrink: 0;
    padding: 16px 22px 8px;
    text-align: center;
  }
  .today-day {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
    line-height: 1;
  }
  .today-day .day-accent {
    color: var(--gold);
    font-style: italic;
  }
  .today-date {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .today-promo-strip {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: rgba(230,0,18,0.15);
    border: 1px solid rgba(230,0,18,0.4);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    color: #FFB3B8;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .today-promo-strip::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--scarlet);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(230,0,18,0.7); }
    50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(230,0,18,0); }
  }

  /* ────── HERO STAGE ────── */
  .stage {
    flex: 1;
    position: relative;
    padding: 10px 22px 14px;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .promo-card {
    position: relative;
    flex: 1;
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.45),
      0 4px 14px rgba(0,0,0,0.3),
      inset 0 1px 0 rgba(255,255,255,0.08);
    background: #000;
    min-height: 0;
  }
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity 1.1s cubic-bezier(0.4, 0, 0.2, 1), transform 8.5s linear;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Slides show poster image as-is, no text overlay.
     Only small floating badges for special states (today, expiring). */
  .slide-badge {
    position: absolute;
    top: 14px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.35);
  }
  .slide-badge.today {
    left: 14px;
    background: rgba(230,0,18,0.95);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
  }
  .slide-badge.today::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: pulseDot 1.5s ease-in-out infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .slide-badge.expiring {
    right: 14px;
    background: rgba(255,193,7,0.95);
    border: 1px solid rgba(255,255,255,0.4);
    color: #1B1464;
  }
  .slide-badge.expiring.last-day {
    background: rgba(230,0,18,0.95);
    color: #fff;
    animation: lastDayPulse 1.4s ease-in-out infinite;
  }
  @keyframes lastDayPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 4px 16px rgba(230,0,18,0.5); }
    50% { transform: scale(1.05); box-shadow: 0 4px 22px rgba(230,0,18,0.8); }
  }
  .slide-badge.gold {
    left: 14px;
    background: linear-gradient(135deg, rgba(212,168,67,0.96), rgba(242,201,76,0.92));
    border: 1px solid rgba(255,255,255,0.4);
    color: #1B1464;
  }

  /* ────── COMING-UP / DOTS ────── */
  .progress {
    flex-shrink: 0;
    padding: 12px 22px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .progress-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.55);
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .dots {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    flex-wrap: wrap;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    transition: all 0.35s ease;
  }
  .dot.active {
    background: var(--gold);
    width: 22px;
    border-radius: 999px;
    box-shadow: 0 0 10px rgba(212,168,67,0.5);
  }

  /* ────── FOOTER ────── */
  .footer {
    flex-shrink: 0;
    padding: 14px 22px 18px;
    background: linear-gradient(180deg, transparent 0%, rgba(13,11,111,0.75) 50%, rgba(13,11,111,0.95) 100%);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .contact {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .wa-line {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.3px;
  }
  .wa-line .wa-icon {
    width: 16px;
    height: 16px;
    background: #25D366;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 10px;
    font-weight: 900;
  }
  .location {
    font-size: 10px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.6px;
    font-weight: 500;
  }
  .qr-stub {
    text-align: center;
    font-size: 8px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    line-height: 1.3;
  }
  .qr-stub strong {
    display: block;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.5px;
    margin-top: 2px;
    text-transform: none;
    font-weight: 700;
  }

  /* ────── SUDOKU TEMPLATE SLIDE ────── */
  .sudoku-slide {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 0%, rgba(212,168,67,0.18) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(230,0,18,0.10) 0%, transparent 50%),
      linear-gradient(160deg, #faf6ec 0%, #ffffff 60%, #f4f6fb 100%);
    color: #1B1464;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-evenly;
    padding: 30px 22px 24px;
    text-align: center;
  }
  .sudoku-eyebrow {
    font-size: 11px;
    letter-spacing: 4.5px;
    font-weight: 800;
    color: #E60012;
    text-transform: uppercase;
  }
  .sudoku-title {
    font-family: 'Playfair Display', serif;
    font-size: 58px;
    font-weight: 700;
    color: #1B1464;
    letter-spacing: -2px;
    margin: 4px 0 4px;
    line-height: 1;
  }
  .sudoku-tagline {
    font-size: 13px;
    color: #5A6478;
    font-weight: 500;
    max-width: 280px;
    line-height: 1.4;
  }
  .sudoku-qr-frame {
    background: #fff;
    padding: 16px;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(27,20,100,0.12), 0 2px 6px rgba(27,20,100,0.04);
    border: 2px solid #D4A843;
    text-align: center;
    position: relative;
  }
  .sudoku-qr-frame::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 22px;
    background: linear-gradient(135deg, rgba(212,168,67,0.4), transparent);
    z-index: -1;
    filter: blur(8px);
  }
  .sudoku-qr-target {
    width: 200px; height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  .sudoku-qr-target img, .sudoku-qr-target canvas {
    width: 100% !important;
    height: 100% !important;
  }
  .sudoku-qr-caption {
    margin-top: 10px;
    font-size: 10px;
    color: #5A6478;
    line-height: 1.4;
    font-weight: 500;
  }
  .sudoku-qr-caption strong {
    display: block;
    font-size: 13px;
    color: #1B1464;
    font-weight: 800;
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .sudoku-vouchers-label {
    font-size: 10px;
    letter-spacing: 3px;
    font-weight: 800;
    color: #1B1464;
    text-transform: uppercase;
  }
  .sudoku-tiers {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    width: 100%;
    max-width: 320px;
  }
  .tier {
    background: #fff;
    border-radius: 12px;
    padding: 11px 4px 9px;
    box-shadow: 0 3px 10px rgba(27,20,100,0.08);
    border-top: 3px solid;
  }
  .tier-bronze { border-color: #cd7f32; }
  .tier-silver { border-color: #B8B8B8; }
  .tier-gold {
    border-color: #D4A843;
    background: linear-gradient(180deg, rgba(212,168,67,0.10), #fff);
    transform: scale(1.04);
    box-shadow: 0 6px 18px rgba(212,168,67,0.25);
  }
  .tier-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    font-weight: 800;
  }
  .tier-bronze .tier-label { color: #cd7f32; }
  .tier-silver .tier-label { color: #777; }
  .tier-gold .tier-label { color: #b8860b; }
  .tier-amount {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 800;
    color: #1B1464;
    margin: 2px 0 0;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .tier-detail {
    font-size: 8.5px;
    color: #5A6478;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .tier-puzzles {
    font-size: 10px;
    color: #1B1464;
    font-weight: 700;
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(27,20,100,0.08);
  }
  .sudoku-footnote {
    font-size: 10px;
    color: #5A6478;
    letter-spacing: 0.5px;
    font-style: italic;
    max-width: 290px;
    line-height: 1.4;
  }

  /* ────── CAT CORNER (inline SVG, CSS-animated) ────── */
  .cat-corner {
    position: absolute;
    bottom: 12px;
    left: 12px;
    width: 130px;
    height: 130px;
    z-index: 5;
    pointer-events: none;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45));
  }
  .cat-svg { width: 100%; height: 100%; overflow: visible; }
  .cat-state-label {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #fff;
    background: rgba(13,11,111,0.85);
    backdrop-filter: blur(8px);
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .cat-corner.show-label .cat-state-label { opacity: 1; }

  /* Subtle shadow under cat */
  .cat-shadow { animation: shadowPulse 1.8s ease-in-out infinite; transform-origin: center; }
  @keyframes shadowPulse { 0%,100%{transform:scaleX(1);opacity:.25} 50%{transform:scaleX(.92);opacity:.2} }

  /* Hide state extras by default */
  .cat-zzz, .cat-bowl, .cat-ball, .cat-food { opacity: 0; transition: opacity .4s; }
  .cat-svg .cat-eye-closed { opacity: 0; transition: opacity .3s; }

  /* === WALKING === gentle body bob + tail wag + slight tail/head sway === */
  .cat-walking .cat-body,
  .cat-walking .cat-belly,
  .cat-walking .cat-head { animation: catBob 0.55s ease-in-out infinite alternate; }
  .cat-walking .cat-tail { animation: tailWag 0.7s ease-in-out infinite; transform-origin: 78px 75px; }
  .cat-walking .cat-leg-bl { animation: legStep1 0.55s linear infinite; transform-origin: 33px 92px; }
  .cat-walking .cat-leg-br { animation: legStep2 0.55s linear infinite; transform-origin: 72px 92px; }
  @keyframes catBob { from { transform: translateY(0) } to { transform: translateY(-2px) } }
  @keyframes tailWag { 0%,100% { transform: rotate(-8deg) } 50% { transform: rotate(15deg) } }
  @keyframes legStep1 { 0%,100% { transform: rotate(0) } 50% { transform: rotate(-15deg) } }
  @keyframes legStep2 { 0%,100% { transform: rotate(0) } 50% { transform: rotate(15deg) } }

  /* === SLEEPING === breathing, eyes closed, ZZZ floats === */
  .cat-sleeping .cat-eye { opacity: 0; }
  .cat-sleeping .cat-eye-closed { opacity: 1; }
  .cat-sleeping .cat-body,
  .cat-sleeping .cat-belly { animation: breathe 3s ease-in-out infinite; transform-origin: center bottom; }
  .cat-sleeping .cat-head { animation: breatheHead 3s ease-in-out infinite; }
  .cat-sleeping .cat-zzz { opacity: 1; animation: zzzFloat 3s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scaleY(1) } 50% { transform: scaleY(1.05) } }
  @keyframes breatheHead { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-1.5px) } }
  @keyframes zzzFloat { 0% { opacity:0; transform: translateY(0) } 30% { opacity:1 } 100% { opacity:0; transform: translateY(-14px) } }

  /* === PLAYING === hopping, tail very active, ball appears === */
  .cat-playing { animation: catHop 0.7s ease-in-out infinite; transform-origin: center bottom; }
  .cat-playing .cat-tail { animation: tailWag 0.3s ease-in-out infinite; transform-origin: 78px 75px; }
  .cat-playing .cat-ball { opacity: 1; animation: ballRoll 0.7s ease-in-out infinite; transform-origin: 95px 100px; }
  @keyframes catHop { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-8px) } }
  @keyframes ballRoll { 0%,100% { transform: translateX(0) rotate(0deg) } 50% { transform: translateX(-8px) rotate(-180deg) } }

  /* === EATING === head bobs down to bowl === */
  .cat-eating .cat-head { animation: eatBob 0.9s ease-in-out infinite; transform-origin: bottom right; }
  .cat-eating .cat-bowl { opacity: 1; }
  .cat-eating .cat-food { opacity: 1; animation: foodNibble 0.9s ease-in-out infinite; }
  @keyframes eatBob { 0%,100% { transform: translateY(0) rotate(0deg) } 50% { transform: translateY(6px) rotate(-8deg) } }
  @keyframes foodNibble { 0%,100% { opacity: 1; transform: scale(1) } 50% { opacity: .6; transform: scale(.85) } }

  /* ────── STATUS / LOADING ────── */
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--navy);
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .status-dot {
    position: fixed;
    bottom: 6px;
    right: 8px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(80,200,120,0.7);
    z-index: 99;
  }
  .status-dot.offline { background: rgba(230,0,18,0.7); }

  /* Mid-Valley orientation guard:
     Optimized for 768x1366 portrait (Philips DISPLAY2).
     Scales gracefully on other ratios. */
  @media (min-aspect-ratio: 4/5) {
    /* Landscape fallback — content reflow */
    body { padding: 0; }
  }

  /* High-DPI tuning */
  @media (min-width: 900px) and (orientation: portrait) {
    .today-day { font-size: 40px; }
    .slide-title { font-size: 24px; }
    .slide-subtitle { font-size: 14px; }
    .brand-mark { font-size: 26px; }
  }
</style>
</head>
<body>

<!-- Loading -->
<div class="loading" id="loading">
  <div class="spinner"></div>
</div>

<!-- Header -->
<header class="header">
  <div class="brand">
    <img class="brand-logo" src="assets/brand/menara-logo.jpg" alt="Menara Optometry" />
  </div>
  <div class="anniversary">30 Tahun</div>
  <div class="clock">
    <div class="clock-time" id="clockTime">--:--</div>
    <div id="clockDate">—</div>
  </div>
</header>

<!-- Today Band -->
<div class="today-band">
  <div class="today-day" id="todayDay">—</div>
  <div class="today-date" id="todayDate">—</div>
  <div class="today-promo-strip" id="todayPromoStrip">Today's Special</div>
</div>

<!-- Stage -->
<div class="stage">
  <div class="promo-card" id="promoCard">
    <!-- Slides injected by JS -->
  </div>
  <!-- Inline SVG tuxedo cat — cycles walking/sleeping/playing/eating -->
  <div class="cat-corner cat-walking" id="catCorner">
    <svg class="cat-svg" viewBox="-10 0 130 130" xmlns="http://www.w3.org/2000/svg">
      <!-- shadow under cat -->
      <ellipse class="cat-shadow" cx="55" cy="115" rx="40" ry="4" fill="rgba(0,0,0,0.4)"/>

      <!-- Tail -->
      <path class="cat-tail" d="M78 75 Q105 55 95 25" stroke="#1a1a1a" stroke-width="9" fill="none" stroke-linecap="round"/>

      <!-- Body -->
      <ellipse class="cat-body" cx="50" cy="80" rx="32" ry="20" fill="#1a1a1a"/>
      <!-- Belly (white) -->
      <ellipse class="cat-belly" cx="50" cy="85" rx="20" ry="12" fill="#fff"/>

      <!-- Back legs -->
      <rect class="cat-leg cat-leg-bl" x="30" y="92" width="7" height="14" rx="3" fill="#1a1a1a"/>
      <rect class="cat-leg cat-leg-br" x="69" y="92" width="7" height="14" rx="3" fill="#1a1a1a"/>
      <!-- White paws -->
      <ellipse cx="33.5" cy="107" rx="5" ry="3" fill="#fff"/>
      <ellipse cx="72.5" cy="107" rx="5" ry="3" fill="#fff"/>

      <!-- Head (group so it can animate together) -->
      <g class="cat-head" transform="translate(8 38)">
        <!-- Ears -->
        <polygon points="2,8 8,-8 16,5" fill="#1a1a1a"/>
        <polygon points="28,5 36,-8 42,8" fill="#1a1a1a"/>
        <!-- Inner ears (pink) -->
        <polygon points="6,7 9,-2 13,6" fill="#ff9eb5" opacity="0.55"/>
        <polygon points="30,6 35,-2 38,7" fill="#ff9eb5" opacity="0.55"/>
        <!-- Head circle -->
        <circle cx="22" cy="15" r="20" fill="#1a1a1a"/>
        <!-- White face mask -->
        <path d="M10,20 Q22,36 34,20 Q30,33 22,33 Q14,33 10,20 Z" fill="#fff"/>
        <!-- Eyes (open) -->
        <ellipse class="cat-eye cat-eye-left" cx="15" cy="15" rx="3" ry="4" fill="#7fc678"/>
        <ellipse class="cat-eye cat-eye-right" cx="29" cy="15" rx="3" ry="4" fill="#7fc678"/>
        <!-- Eye pupils -->
        <ellipse class="cat-eye cat-eye-left" cx="15" cy="15" rx="1" ry="3" fill="#1a1a1a"/>
        <ellipse class="cat-eye cat-eye-right" cx="29" cy="15" rx="1" ry="3" fill="#1a1a1a"/>
        <!-- Eye highlights -->
        <circle class="cat-eye" cx="16" cy="13.5" r="0.9" fill="#fff"/>
        <circle class="cat-eye" cx="30" cy="13.5" r="0.9" fill="#fff"/>
        <!-- Eyes (closed - sleeping) -->
        <path class="cat-eye-closed" d="M12,16 Q15,14 18,16" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path class="cat-eye-closed" d="M26,16 Q29,14 32,16" stroke="#1a1a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <!-- Nose -->
        <polygon points="20,22 24,22 22,25" fill="#ff9eb5"/>
        <!-- Mouth -->
        <path d="M22,25 Q19,28 17,27 M22,25 Q25,28 27,27" stroke="#1a1a1a" stroke-width="0.9" fill="none" stroke-linecap="round"/>
        <!-- Whiskers -->
        <line x1="10" y1="24" x2="2" y2="23" stroke="#fff" stroke-width="0.6"/>
        <line x1="10" y1="26" x2="2" y2="27" stroke="#fff" stroke-width="0.6"/>
        <line x1="34" y1="24" x2="42" y2="23" stroke="#fff" stroke-width="0.6"/>
        <line x1="34" y1="26" x2="42" y2="27" stroke="#fff" stroke-width="0.6"/>
      </g>

      <!-- ZZZ for sleeping -->
      <g class="cat-zzz">
        <text x="78" y="35" fill="#fff" font-family="Plus Jakarta Sans,sans-serif" font-size="13" font-weight="800">Z</text>
        <text x="88" y="24" fill="#fff" font-family="Plus Jakarta Sans,sans-serif" font-size="10" font-weight="800" opacity="0.75">z</text>
        <text x="95" y="15" fill="#fff" font-family="Plus Jakarta Sans,sans-serif" font-size="7" font-weight="800" opacity="0.5">z</text>
      </g>

      <!-- Food bowl for eating -->
      <g class="cat-bowl">
        <ellipse cx="20" cy="106" rx="13" ry="3" fill="#D4A843"/>
        <path d="M8,104 L11,110 L29,110 L32,104 Z" fill="#D4A843"/>
        <ellipse cx="20" cy="104" rx="11" ry="2.5" fill="#a07b2c"/>
      </g>
      <g class="cat-food">
        <circle cx="17" cy="103" r="1.2" fill="#3a2a1a"/>
        <circle cx="21" cy="102" r="1.2" fill="#3a2a1a"/>
        <circle cx="24" cy="103" r="1.2" fill="#3a2a1a"/>
      </g>

      <!-- Ball for playing -->
      <g class="cat-ball">
        <circle cx="95" cy="100" r="6" fill="#E60012"/>
        <path d="M90,98 Q95,95 100,98" stroke="#fff" stroke-width="0.9" fill="none" opacity="0.7"/>
        <path d="M91,103 Q95,105 99,103" stroke="#fff" stroke-width="0.9" fill="none" opacity="0.4"/>
      </g>
    </svg>
    <div class="cat-state-label" id="catStateLabel">walking</div>
  </div>
</div>

<!-- Progress -->
<div class="progress">
  <div class="progress-label">Coming Up</div>
  <div class="dots" id="dots"></div>
  <div class="progress-label" id="slideCounter">0 / 0</div>
</div>

<!-- Footer -->
<footer class="footer">
  <div class="contact">
    <div class="wa-line">
      <span class="wa-icon">W</span>
      +60 11-5419 7980
    </div>
    <div class="location">LG-017 · Mid Valley Megamall · Kuala Lumpur</div>
  </div>
  <div class="qr-stub">
    Scan / WhatsApp
    <strong>Walk-in welcome</strong>
  </div>
</footer>

<!-- Status indicator -->
<div class="status-dot" id="statusDot" title="Connection status"></div>

<script>
(function() {
  'use strict';

  const SLIDE_DURATION = 8500;        // ms per slide
  const REFRESH_INTERVAL = 60 * 60e3; // reload page every 1 hr
  const DATA_URL = 'promos.json';

  const DAY_NAMES_MY = ['Ahad', 'Isnin', 'Selasa', 'Rabu', 'Khamis', 'Jumaat', 'Sabtu'];
  const DAY_NAMES_EN = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const MONTHS_MY = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];

  let slides = [];
  let currentIndex = 0;
  let timer = null;

  // ─── Date helpers ───
  function todayISO() {
    const d = new Date();
    return d.toISOString().split('T')[0];
  }
  function isPromoActive(promo, todayStr) {
    if (promo.validFrom && todayStr < promo.validFrom) return false;
    if (promo.validUntil && todayStr > promo.validUntil) return false;
    return true;
  }
  function daysUntil(dateStr) {
    if (!dateStr) return Infinity;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(dateStr);
    return Math.ceil((target - today) / 86400000);
  }

  // ─── Clock ───
  function updateClock() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    document.getElementById('clockTime').textContent = `${hh}:${mm}`;
    document.getElementById('clockDate').textContent = `${d.getDate()} ${MONTHS_MY[d.getMonth()]}`;
  }

  // ─── Today band ───
  function paintTodayBand(today7DP) {
    const d = new Date();
    const dayEN = DAY_NAMES_EN[d.getDay()];
    const dayMY = DAY_NAMES_MY[d.getDay()];
    document.getElementById('todayDay').innerHTML =
      `${dayEN} <span class="day-accent">/ ${dayMY}</span>`;
    document.getElementById('todayDate').textContent =
      `${d.getDate()} ${MONTHS_MY[d.getMonth()]} ${d.getFullYear()}`;
    if (today7DP) {
      document.getElementById('todayPromoStrip').textContent = today7DP.dayName;
    } else {
      document.getElementById('todayPromoStrip').textContent = 'Today\'s Special';
    }
  }

  // ─── Slide templates ───
  function renderSudokuTemplate() {
    return `
      <div class="sudoku-slide">
        <div>
          <div class="sudoku-eyebrow">Brain Break</div>
          <h1 class="sudoku-title">Sudoku</h1>
          <div class="sudoku-tagline">Bored while waiting? Scan, solve, and win.</div>
        </div>
        <div class="sudoku-qr-frame">
          <div class="sudoku-qr-target" data-qr></div>
          <div class="sudoku-qr-caption">
            <strong>SCAN TO PLAY</strong>
            Free · No app · Play in browser
          </div>
        </div>
        <div>
          <div class="sudoku-vouchers-label">Win vouchers up to RM100</div>
        </div>
        <div class="sudoku-tiers">
          <div class="tier tier-bronze">
            <div class="tier-label">BRONZE</div>
            <div class="tier-amount">RM30</div>
            <div class="tier-detail">Voucher</div>
            <div class="tier-puzzles">Solve 15</div>
          </div>
          <div class="tier tier-silver">
            <div class="tier-label">SILVER</div>
            <div class="tier-amount">RM50</div>
            <div class="tier-detail">Voucher</div>
            <div class="tier-puzzles">Solve 30</div>
          </div>
          <div class="tier tier-gold">
            <div class="tier-label">GOLD</div>
            <div class="tier-amount">RM100</div>
            <div class="tier-detail">Voucher</div>
            <div class="tier-puzzles">Solve 50</div>
          </div>
        </div>
        <div class="sudoku-footnote">Show your score at the counter to claim your voucher.</div>
      </div>
    `;
  }

  function injectQRCode(slideEl, url) {
    const target = slideEl.querySelector('[data-qr]');
    if (!target || typeof QRCode === 'undefined') return;
    target.innerHTML = '';
    new QRCode(target, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#1B1464',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  // ─── Slide builder ───
  function buildSlideElement(s, index) {
    const div = document.createElement('div');
    div.className = 'slide';
    div.dataset.index = index;

    if (s.template === 'sudoku') {
      div.innerHTML = renderSudokuTemplate();
      // Generate QR after element exists in DOM
      const qrUrl = s.qrUrl || 'https://menaraoptometrymidvalley.github.io/menaraoptometrycentre-midvalley/sudoku/';
      requestAnimationFrame(() => injectQRCode(div, qrUrl));
    } else {
      const img = document.createElement('img');
      img.src = s.image;
      img.alt = s.alt || '';
      img.onerror = () => {
        img.style.display = 'none';
        div.style.background = 'linear-gradient(135deg, #0D0B6F, #1B1464)';
      };
      div.appendChild(img);
    }

    // Top-left badge (today / anniversary)
    if (s.todayBadge) {
      const b = document.createElement('div');
      b.className = 'slide-badge today';
      b.textContent = s.todayBadge;
      div.appendChild(b);
    } else if (s.goldBadge) {
      const b = document.createElement('div');
      b.className = 'slide-badge gold';
      b.textContent = s.goldBadge;
      div.appendChild(b);
    }

    // Top-right badge (expiry urgency)
    if (s.expiryDays !== undefined && s.expiryDays >= 0 && s.expiryDays <= 14) {
      const ef = document.createElement('div');
      ef.className = 'slide-badge expiring' + (s.expiryDays === 0 ? ' last-day' : '');
      ef.textContent = s.expiryDays === 0
        ? '⏰ Last Day!'
        : `⏰ ${s.expiryDays}d left`;
      div.appendChild(ef);
    }

    return div;
  }

  function renderDots() {
    const dotsEl = document.getElementById('dots');
    dotsEl.innerHTML = '';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot' + (i === currentIndex ? ' active' : '');
      dotsEl.appendChild(d);
    });
    document.getElementById('slideCounter').textContent =
      `${currentIndex + 1} / ${slides.length}`;
  }

  function showSlide(idx) {
    const cards = document.querySelectorAll('.slide');
    cards.forEach((c, i) => c.classList.toggle('active', i === idx));
    currentIndex = idx;
    renderDots();
  }

  function advance() {
    if (slides.length === 0) return;
    showSlide((currentIndex + 1) % slides.length);
  }

  // ─── Build slide deck — CURATED for today only ───
  function buildDeck(data) {
    const today = todayISO();
    const dayOfWeek = new Date().getDay();
    const deck = [];

    // 1. TODAY's 7DP — the headliner
    const today7DP = (data.weekly7DP || []).find(p => p.day === dayOfWeek);
    if (today7DP) {
      deck.push({
        image: today7DP.image,
        alt: today7DP.dayName,
        todayBadge: 'Today · ' + today7DP.dayName
      });
    }

    // 2. Day-specific bonus content (e.g., Thursday adds CL Aftercare)
    const dayBonus = (data.dayBonus && data.dayBonus[String(dayOfWeek)]) || [];
    dayBonus.forEach(p => {
      deck.push({
        image: p.image,
        alt: p.title,
        todayBadge: p.category || 'Today'
      });
    });

    // 3. Beli & Menang campaign sequence (plays all 4 slides in order)
    const campaigns = (data.campaigns || [])
      .filter(c => isPromoActive(c, today))
      .sort((a, b) => (b.priority || 0) - (a.priority || 0));

    campaigns.forEach(c => {
      if (c.playAsSequence && Array.isArray(c.sequence)) {
        c.sequence.forEach((s, idx) => {
          deck.push({
            image: s.image,
            alt: c.title + ' — ' + (s.label || ''),
            goldBadge: s.label || c.title
          });
        });
      } else {
        deck.push({
          image: c.image,
          alt: c.title,
          goldBadge: c.category || c.title
        });
      }
    });

    // 4. Expiring active promos (≤14 days) — urgency first
    const active = (data.activePromos || [])
      .filter(p => isPromoActive(p, today))
      .map(p => ({ ...p, _daysLeft: daysUntil(p.validUntil) }));

    const expiring = active
      .filter(p => p._daysLeft >= 0 && p._daysLeft <= 14)
      .sort((a, b) => a._daysLeft - b._daysLeft);

    expiring.forEach(p => {
      deck.push({
        image: p.image,
        alt: p.title,
        expiryDays: p._daysLeft
      });
    });

    // 5. Top 2 active promos (not expiring) by priority
    const longRunning = active
      .filter(p => p._daysLeft > 14)
      .sort((a, b) => (b.priority || 0) - (a.priority || 0))
      .slice(0, 2);

    longRunning.forEach(p => {
      deck.push({
        image: p.image,
        alt: p.title
      });
    });

    // 6. Sudoku brain-break (rendered as HTML template, includes live QR + voucher tiers)
    const sudoku = (data.evergreen || []).find(e => e.id === 'sudoku-brain-break');
    if (sudoku) {
      deck.push({
        template: 'sudoku',
        qrUrl: sudoku.qrUrl,
        alt: sudoku.title
      });
    }

    // 7. 30 Tahun anniversary closer
    const anniversary = (data.evergreen || []).find(e => e.id === '30-tahun');
    if (anniversary) {
      deck.push({
        image: anniversary.image,
        alt: anniversary.title,
        goldBadge: '30 Tahun'
      });
    }

    return deck;
  }

  // ─── Boot ───
  async function boot() {
    updateClock();
    setInterval(updateClock, 30000);

    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();

      const today7DP = (data.weekly7DP || []).find(p => p.day === new Date().getDay());
      paintTodayBand(today7DP);

      slides = buildDeck(data);

      const card = document.getElementById('promoCard');
      card.innerHTML = '';
      slides.forEach((s, i) => card.appendChild(buildSlideElement(s, i)));

      if (slides.length > 0) {
        showSlide(0);
        timer = setInterval(advance, SLIDE_DURATION);
      }

      document.getElementById('loading').classList.add('hidden');
      document.getElementById('statusDot').classList.remove('offline');
    } catch (err) {
      console.error('Failed to load promos.json:', err);
      document.getElementById('statusDot').classList.add('offline');
      document.getElementById('loading').innerHTML =
        '<div style="color:#fff;text-align:center;font-family:Plus Jakarta Sans,sans-serif">' +
        '<div style="font-size:48px;margin-bottom:12px">⚠</div>' +
        '<div style="font-size:14px;opacity:0.7">Loading promotions failed</div>' +
        '<div style="font-size:11px;opacity:0.5;margin-top:6px">Retrying in 30 seconds</div></div>';
      setTimeout(() => location.reload(), 30000);
    }
  }

  // ─── Inline SVG cat — cycles through 4 states ───
  const CAT_STATES = ['walking', 'sleeping', 'playing', 'eating'];
  const CAT_STATE_INTERVAL = 14000;  // 14 sec per state
  let catIdx = 0;

  function setCatState(state) {
    const cat = document.getElementById('catCorner');
    CAT_STATES.forEach(s => cat.classList.remove('cat-' + s));
    cat.classList.add('cat-' + state);
    document.getElementById('catStateLabel').textContent = state;
    cat.classList.add('show-label');
    setTimeout(() => cat.classList.remove('show-label'), 2500);
  }

  function rotateCatState() {
    catIdx = (catIdx + 1) % CAT_STATES.length;
    setCatState(CAT_STATES[catIdx]);
  }

  function startCat() {
    setCatState(CAT_STATES[0]);
    setInterval(rotateCatState, CAT_STATE_INTERVAL);
  }

  // Hard refresh every hour to pick up new promos.json
  setTimeout(() => location.reload(), REFRESH_INTERVAL);

  // Cursor hiding — only in kiosk/fullscreen mode
  function syncKioskMode() {
    const isKiosk = !!document.fullscreenElement
      || new URLSearchParams(location.search).has('kiosk');
    document.body.classList.toggle('kiosk-mode', isKiosk);
  }
  document.addEventListener('fullscreenchange', syncKioskMode);
  syncKioskMode();

  // Connection monitoring
  window.addEventListener('online', () => {
    document.getElementById('statusDot').classList.remove('offline');
  });
  window.addEventListener('offline', () => {
    document.getElementById('statusDot').classList.add('offline');
  });

  // Click anywhere to advance manually (useful during setup)
  document.addEventListener('click', () => {
    clearInterval(timer);
    advance();
    timer = setInterval(advance, SLIDE_DURATION);
  });

  // Press F for fullscreen
  document.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'f') {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    }
  });

  boot();
  startCat();
})();
</script>
</body>
</html>
