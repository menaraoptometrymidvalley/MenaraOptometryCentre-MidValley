<!-- Jungfraujoch backdrop + walking pixel cat (self-contained) -->
<script>
(function () {
  const css = `
    body { position: relative; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: url('assets/bg-jungfraujoch.webp') center 38% / cover no-repeat;
      opacity: .18; pointer-events: none; z-index: -2;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: linear-gradient(180deg,
        rgba(247,247,245,.55) 0%,
        rgba(247,247,245,.78) 55%,
        rgba(247,247,245,.92) 100%);
      pointer-events: none; z-index: -1;
    }
    .opscat-wrap {
      position: fixed; left: 0; bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 5; width: 76px; height: 96px;
      display: flex; align-items: flex-end; justify-content: center;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 8px 16px rgba(27,20,100,.25));
      transform: translate(50vw, 0); transition: filter .2s;
    }
    .opscat-wrap:hover { filter: drop-shadow(0 10px 22px rgba(237,28,36,.35)); }
    .opscat-wrap.flip .opscat { transform: scaleX(-1); }
    .opscat { transition: transform 220ms ease; transform-origin: 50% 100%; }
    .opscat svg { width: 76px; height: 76px; image-rendering: pixelated; display: block; }
    .opscat-mode-sitting, .opscat-mode-walking { transform: scale(1); }
    .opscat-mode-watching { transform: scale(1.04); }
    .opscat-mode-sleeping { transform: rotate(-78deg) translate(-18px,-6px) scale(.9); }
    .opscat-mode-playing  { animation: opscatHop 850ms ease-in-out infinite; transform-origin: 50% 100%; }
    @keyframes opscatHop {
      0%,100% { transform: scaleY(.95) translateY(2px)  rotate(0); }
      25%     { transform: scaleY(1.10) translateY(-12px) rotate(-4deg); }
      45%     { transform: scaleY(.84) translateY(3px)  rotate(2deg); }
      65%     { transform: scaleY(1.06) translateY(-6px) rotate(3deg); }
      85%     { transform: scaleY(.97) translateY(1px)  rotate(-1deg); }
    }
    .opscat-tip {
      position: absolute; left: 50%; bottom: 100%;
      transform: translate(-50%, 4px); margin-bottom: 4px;
      font-size: 10px; letter-spacing: .12em; text-transform: uppercase;
      color: #fff; background: var(--primary, #1B1464);
      padding: 3px 9px; border-radius: 99px; white-space: nowrap;
      opacity: 0; transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }
    .opscat-wrap:hover .opscat-tip { opacity: 1; transform: translate(-50%, 0); }
    @media (max-width: 480px) {
      .opscat-wrap { width: 58px; height: 78px; }
      .opscat svg { width: 58px; height: 58px; }
    }
  `;
  const style = document.createElement('style');
  style.textContent = css;
  document.head.appendChild(style);

  const wrap = document.createElement('div');
  wrap.className = 'opscat-wrap';
  wrap.id = 'opscatWrap';
  wrap.title = 'Click for a different mood';
  wrap.innerHTML = '<span class="opscat-tip" id="opscatTip">walking</span><div class="opscat" id="opscatEl"></div>';
  document.body.appendChild(wrap);

  const G='#5b4636', GD='#3b2a1e', GH='#a07e5c', EYE='#1B1464', NOSE='#ED1C24';
  const px = (x,y,w,h,c) => `<rect x="${x*4}" y="${y*4}" width="${w*4}" height="${h*4}" fill="${c}"/>`;
  const svg = p => `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">${p}</svg>`;

  const POSES = {
    sitting: () => svg([
      px(3,4,2,2,G),px(11,4,2,2,G),px(3,5,1,1,GD),px(12,5,1,1,GD),
      px(3,6,10,4,G),px(3,9,10,1,GD),px(5,7,1,1,EYE),px(10,7,1,1,EYE),
      px(7,8,2,1,NOSE),px(4,10,8,4,G),px(4,13,8,1,GD),
      px(12,11,2,1,G),px(13,10,1,1,G),px(5,14,2,1,GH),px(9,14,2,1,GH)
    ].join('')),
    walkingA: () => svg([
      px(3,4,2,2,G),px(11,4,2,2,G),px(3,5,1,1,GD),px(12,5,1,1,GD),
      px(3,6,10,4,G),px(3,9,10,1,GD),px(5,7,1,1,EYE),px(10,7,1,1,EYE),
      px(7,8,2,1,NOSE),px(4,10,8,4,G),px(4,13,8,1,GD),
      px(12,9,1,1,G),px(13,8,1,1,G),px(13,7,1,1,G),
      px(4,14,2,1,GH),px(10,14,2,1,GH)
    ].join('')),
    walkingB: () => svg([
      px(3,4,2,2,G),px(11,4,2,2,G),px(3,5,1,1,GD),px(12,5,1,1,GD),
      px(3,6,10,4,G),px(3,9,10,1,GD),px(5,7,1,1,EYE),px(10,7,1,1,EYE),
      px(7,8,2,1,NOSE),px(4,10,8,4,G),px(4,13,8,1,GD),
      px(12,10,1,1,G),px(13,9,1,1,G),px(13,10,1,1,G),
      px(6,14,2,1,GH),px(8,14,2,1,GH)
    ].join('')),
    watching: () => svg([
      px(3,4,2,2,G),px(11,4,2,2,G),px(3,5,1,1,GD),px(12,5,1,1,GD),
      px(3,6,10,4,G),px(3,9,10,1,GD),
      px(5,7,2,2,EYE),px(9,7,2,2,EYE),px(6,7,1,1,GH),px(10,7,1,1,GH),
      px(7,9,2,1,NOSE),px(5,10,6,3,G),px(5,12,6,1,GD),
      px(11,11,2,1,G),px(13,10,1,1,G)
    ].join('')),
    playing: () => svg([
      px(3,5,2,2,G),px(11,5,2,2,G),px(3,6,1,1,GD),px(12,6,1,1,GD),
      px(3,7,10,4,G),px(3,10,10,1,GD),px(5,8,1,1,EYE),px(10,8,1,1,EYE),
      px(7,9,2,1,NOSE),px(4,11,8,2,G),px(4,12,8,1,GH),
      px(3,11,1,1,GH),px(12,11,1,1,GH),px(13,8,1,1,G),px(14,9,1,1,G)
    ].join('')),
    sleeping: () => svg([
      px(3,7,2,2,G),px(11,7,2,2,G),px(3,8,1,1,GD),px(12,8,1,1,GD),
      px(3,9,10,4,G),px(3,12,10,1,GD),
      px(5,10,2,1,EYE),px(9,10,2,1,EYE),px(7,11,2,1,NOSE),px(2,11,1,2,G),
      px(13,5,1,1,GH),px(14,4,1,1,GH),px(13,6,1,1,GH)
    ].join('')),
  };

  const S = { el:null, wrap:null, tip:null,
    x:0, dir:1, speed:30,
    mode:'walking', modeUntil:0,
    legFrame:'A', legSwitchAt:0, nextActionAt:0,
    lastT:0, lastEvalT:0,
    manualMood:null, manualUntil:0 };
  const margin = () => (S.wrap.offsetWidth || 76)/2 + 8;

  function setMode(m){ if (S.mode===m) return; S.mode=m; S.tip.textContent=m; render(); }
  function render(){
    let body;
    if (S.mode==='walking') body = S.legFrame==='A' ? POSES.walkingA() : POSES.walkingB();
    else body = (POSES[S.mode]||POSES.sitting)();
    S.el.innerHTML = body;
    S.el.className = 'opscat opscat-mode-' + S.mode;
  }
  function evaluate(force){
    if (S.manualMood && performance.now() < S.manualUntil) return;
    S.manualMood = null;
    if (S.modeUntil && performance.now() < S.modeUntil) return;
    const h = new Date().getHours();
    let next;
    if (h>=22 || h<6) next = 'sleeping';
    else if (h>=7 && h<21 && Math.random()<.15) {
      next = 'playing';
      S.modeUntil = performance.now() + 4500 + Math.random()*2500;
    }
    else next = S.mode==='sitting' ? 'sitting' : 'walking';
    if (force || next !== S.mode) setMode(next);
  }
  function cycle(){
    const order = ['walking','sitting','watching','playing','sleeping'];
    const cur = order.indexOf(S.manualMood || S.mode);
    const next = order[(cur+1) % order.length];
    S.manualMood = next;
    S.manualUntil = performance.now() + 25000;
    setMode(next);
  }
  function tick(now){
    const dt = Math.min(.05, (now - S.lastT)/1000);
    S.lastT = now;
    if (now - S.lastEvalT > 2000) { S.lastEvalT = now; evaluate(); }
    let bob = 0;
    if (S.mode==='walking') {
      S.x += S.dir * S.speed * dt;
      const m = margin();
      if (S.x < m)              { S.x = m; S.dir = 1; }
      if (S.x > innerWidth - m) { S.x = innerWidth - m; S.dir = -1; }
      bob = Math.sin(now/220) * 2;
      if (now > S.legSwitchAt) { S.legFrame = S.legFrame==='A'?'B':'A'; S.legSwitchAt = now+260; render(); }
      if (now > S.nextActionAt) { setMode('sitting'); S.nextActionAt = now + 1800 + Math.random()*2400; }
    } else if (S.mode==='sitting') {
      if (now > S.nextActionAt) { setMode('walking'); S.nextActionAt = now + 6000 + Math.random()*8000; }
    } else if (S.mode==='sleeping') {
      bob = Math.sin(now/900) * 1.5;
    } else if (S.mode==='playing') {
      S.x += S.dir * (S.speed*.25) * dt;
      const m = margin();
      if (S.x < m)              { S.x = m; S.dir = 1; }
      if (S.x > innerWidth - m) { S.x = innerWidth - m; S.dir = -1; }
    }
    const wrapW = S.wrap.offsetWidth || 76;
    S.wrap.classList.toggle('flip', S.dir===-1 && S.mode==='walking');
    S.wrap.style.transform = `translate(${Math.round(S.x - wrapW/2)}px, ${Math.round(-bob)}px)`;
    requestAnimationFrame(tick);
  }
  function boot(){
    S.el = document.getElementById('opscatEl');
    S.wrap = document.getElementById('opscatWrap');
    S.tip = document.getElementById('opscatTip');
    S.x = innerWidth * 0.5;
    S.lastT = performance.now();
    S.nextActionAt = S.lastT + 5000 + Math.random()*5000;
    S.legSwitchAt = S.lastT + 260;
    evaluate(true);
    S.wrap.addEventListener('click', cycle);
    requestAnimationFrame(tick);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
